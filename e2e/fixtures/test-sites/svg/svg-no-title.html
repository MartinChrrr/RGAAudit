<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test — SVG sans title</title>
</head>
<body>
  <h1>Page de test SVG</h1>

  <!-- DOIT être détecté — SVG_NO_TITLE "certain" -->
  <svg role="img" width="100" height="100" id="svg-no-title">
    <circle cx="50" cy="50" r="40" fill="blue"/>
  </svg>

  <!-- NE DOIT PAS être détecté — SVG avec <title> -->
  <svg role="img" width="100" height="100" id="svg-with-title">
    <title>Graphique de progression</title>
    <circle cx="50" cy="50" r="40" fill="green"/>
  </svg>

  <!-- NE DOIT PAS être détecté — aria-hidden -->
  <svg role="img" width="100" height="100" aria-hidden="true" id="svg-hidden">
    <circle cx="50" cy="50" r="40" fill="red"/>
  </svg>

  <!-- DOIT être détecté — aria-labelledby pointant vers id inexistant -->
  <svg role="img" width="100" height="100" aria-labelledby="nonexistent-id" id="svg-bad-ref">
    <circle cx="50" cy="50" r="40" fill="orange"/>
  </svg>

  <!-- NE DOIT PAS être détecté — aria-label présent -->
  <svg role="img" width="100" height="100" aria-label="Graphique" id="svg-with-aria-label">
    <circle cx="50" cy="50" r="40" fill="purple"/>
  </svg>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test — Titres simulés en CSS</title>
</head>
<body>
  <h1>Page de test</h1>

  <!-- DOIT être détecté — FAKE_HEADING "likely" -->
  <div style="font-size:28px;font-weight:bold" id="fake-heading-bold">Notre mission</div>

  <!-- DOIT être détecté — fontSize > 24px seul -->
  <div style="font-size:26px" id="fake-heading-large">Nos valeurs</div>

  <!-- NE DOIT PAS être détecté — vrai titre -->
  <h2 id="real-heading">Vrai titre</h2>

  <!-- NE DOIT PAS être détecté — contient un enfant sémantique -->
  <div id="div-with-heading"><h2>Titre dans un div</h2></div>

  <!-- NE DOIT PAS être détecté — dans <nav> -->
  <nav><div style="font-size:24px;font-weight:bold" id="nav-heading">Menu</div></nav>

  <!-- NE DOIT PAS être détecté — texte trop court -->
  <div style="font-size:28px;font-weight:bold" id="short-text">OK</div>

  <!-- NE DOIT PAS être détecté — texte trop long (>120 chars) -->
  <div style="font-size:28px;font-weight:bold" id="long-text">Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua venenatis</div>

  <!-- NE DOIT PAS être détecté — aria-hidden -->
  <div style="font-size:28px;font-weight:bold" aria-hidden="true" id="hidden-heading">Caché</div>
</body>
</html>
